<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Library</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1410 0%, #2d1f17 100%);
      color: #e8e3d8;
      min-height: 100vh;
      padding: 20px;
    }

    .app-container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      padding: 40px 0 60px;
      border-bottom: 1px solid rgba(200, 170, 120, 0.2);
      margin-bottom: 48px;
    }

    h1 {
      font-size: 2.5em;
      font-weight: 700;
      color: #c8aa78;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9em;
      color: #8a7c6b;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: rgba(40, 30, 22, 0.6);
      border: 1px solid rgba(200, 170, 120, 0.15);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-4px);
      border-color: rgba(200, 170, 120, 0.4);
    }

    .stat-card.active {
      border-color: #c8aa78;
      background: rgba(200, 170, 120, 0.1);
    }

    .stat-label {
      font-size: 0.85em;
      color: #8a7c6b;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2.5em;
      font-weight: 700;
      color: #c8aa78;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .search-input {
      flex: 1;
      min-width: 200px;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(200, 170, 120, 0.2);
      color: #e8e3d8;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 0.95em;
    }

    .btn {
      background: linear-gradient(135deg, #c8aa78, #a88e5f);
      color: #1a1410;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      font-size: 0.95em;
    }

    .btn-secondary {
      background: rgba(200, 170, 120, 0.1);
      color: #c8aa78;
      border: 1px solid rgba(200, 170, 120, 0.3);
    }

    .books-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .book-card {
      background: rgba(30, 22, 16, 0.7);
      border: 1px solid rgba(200, 170, 120, 0.15);
      border-radius: 10px;
      padding: 20px;
      transition: all 0.3s ease;
    }

    .book-card:hover {
      transform: translateY(-4px);
      border-color: rgba(200, 170, 120, 0.4);
    }

    .book-title {
      font-size: 1.3em;
      font-weight: 600;
      color: #e8e3d8;
      margin-bottom: 8px;
    }

    .book-author {
      font-size: 0.9em;
      color: #8a7c6b;
      margin-bottom: 12px;
    }

    .book-meta {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .badge {
      font-size: 0.75em;
      color: #c8aa78;
      background: rgba(200, 170, 120, 0.1);
      padding: 4px 12px;
      border-radius: 12px;
      border: 1px solid rgba(200, 170, 120, 0.2);
    }

    .book-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    .book-action-btn {
      background: rgba(200, 170, 120, 0.1);
      border: 1px solid rgba(200, 170, 120, 0.2);
      color: #c8aa78;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.85em;
      cursor: pointer;
    }

    .book-action-btn:hover {
      background: rgba(200, 170, 120, 0.2);
    }

    .delete-btn {
      color: #d88080;
      border-color: rgba(216, 128, 128, 0.2);
    }

    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 1000;
      padding: 20px;
      overflow-y: auto;
    }

    .modal.show {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: linear-gradient(135deg, #2d1f17 0%, #1a1410 100%);
      border: 1px solid rgba(200, 170, 120, 0.3);
      border-radius: 16px;
      padding: 30px;
      max-width: 600px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .modal-title {
      font-size: 1.8em;
      color: #c8aa78;
    }

    .close-btn {
      background: rgba(200, 170, 120, 0.1);
      border: 1px solid rgba(200, 170, 120, 0.2);
      color: #c8aa78;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.4em;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 0.9em;
      color: #8a7c6b;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-input, .form-textarea, .form-select {
      width: 100%;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(200, 170, 120, 0.2);
      color: #e8e3d8;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 1em;
      font-family: inherit;
    }

    .form-textarea {
      min-height: 100px;
      resize: vertical;
    }

    .rating-input {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .star {
      font-size: 1.8em;
      cursor: pointer;
      color: rgba(200, 170, 120, 0.3);
    }

    .star.active {
      color: #f4c542;
    }

    .form-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #6b5f4e;
    }

    @media (max-width: 768px) {
      h1 { font-size: 2em; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .books-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <header>
      <h1>My Library</h1>
      <p class="subtitle">Personal Book Collection</p>
    </header>

    <div class="stats-grid">
      <div class="stat-card" onclick="app.filterCategory(null)">
        <div class="stat-label">Total Books</div>
        <div class="stat-value" id="stat-total">0</div>
      </div>
      <div class="stat-card" onclick="app.filterCategory('read')">
        <div class="stat-label">Already Read</div>
        <div class="stat-value" id="stat-read">0</div>
      </div>
      <div class="stat-card" onclick="app.filterCategory('to_read')">
        <div class="stat-label">Not Read Yet</div>
        <div class="stat-value" id="stat-toread">0</div>
      </div>
      <div class="stat-card" onclick="app.filterCategory('maybe')">
        <div class="stat-label">May Read</div>
        <div class="stat-value" id="stat-maybe">0</div>
      </div>
    </div>

    <div class="toolbar">
      <input type="text" class="search-input" id="searchInput" placeholder="Search by title or author..." oninput="app.renderBooks()">
      <button class="btn" onclick="app.openAddModal()">+ Add Book</button>
      <button class="btn btn-secondary" onclick="app.exportData()">📥 Export</button>
      <label class="btn btn-secondary" style="cursor: pointer;">
        📤 Import
        <input type="file" accept=".json" onchange="app.importData(event)" style="display: none;">
      </label>
      <button class="btn btn-secondary" onclick="app.resetToDefaults()">🔄 Reset to 22 Books</button>
    </div>

    <div id="booksContainer" class="books-grid">
      <div style="text-align: center; padding: 40px; color: #c8aa78;">Loading...</div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div id="bookModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="modalTitle">Add Book</h2>
        <button class="close-btn" onclick="app.closeModal()">×</button>
      </div>

      <div class="form-group">
        <label class="form-label">Title *</label>
        <input type="text" class="form-input" id="bookTitle" placeholder="Enter book title">
      </div>

      <div class="form-group">
        <label class="form-label">Author</label>
        <input type="text" class="form-input" id="bookAuthor" placeholder="Enter author name">
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="bookCategory">
          <option value="to_read">Not Read Yet</option>
          <option value="reading">Currently Reading</option>
          <option value="read">Already Read</option>
          <option value="maybe">May Read</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Rating</label>
        <div class="rating-input" id="ratingInput">
          <span class="star" onclick="app.setRating(1)">★</span>
          <span class="star" onclick="app.setRating(2)">★</span>
          <span class="star" onclick="app.setRating(3)">★</span>
          <span class="star" onclick="app.setRating(4)">★</span>
          <span class="star" onclick="app.setRating(5)">★</span>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea" id="bookDescription" placeholder="What is this book about?"></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Personal Notes</label>
        <textarea class="form-textarea" id="bookNotes" placeholder="Your thoughts, quotes, reflections..."></textarea>
      </div>

      <div class="form-actions">
        <button class="btn btn-secondary" onclick="app.closeModal()">Cancel</button>
        <button class="btn" onclick="app.saveBook()">Save Book</button>
      </div>
    </div>
  </div>

  <!-- View Modal -->
  <div id="viewModal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 class="modal-title" id="viewTitle"></h2>
        <button class="close-btn" onclick="app.closeViewModal()">×</button>
      </div>
      <div id="viewContent"></div>
      <div class="form-actions">
        <button class="btn btn-secondary" onclick="app.closeViewModal()">Close</button>
      </div>
    </div>
  </div>

  <script>
    const app = {
      books: [],
      currentFilter: null,
      editingId: null,
      currentRating: 0,

      getDefaultBooks() {
        return [
          { id: Date.now() + 1, title: "The Death of Ivan Ilyich", author: "Leo Tolstoy", category: "maybe", rating: 0, description: "A novella about a high-court judge in 19th-century Russia who confronts the meaning of his life as he faces death. Tolstoy strips away all pretense to show a man realizing too late that he never truly lived.", notes: "" },
          { id: Date.now() + 2, title: "Wuthering Heights", author: "Emily Brontë", category: "maybe", rating: 0, description: "A Gothic tale of obsessive love, revenge, and the destructive power of passion between Heathcliff and Catherine Earnshaw on the Yorkshire moors. Dark, violent, and deeply psychological.", notes: "" },
          { id: Date.now() + 3, title: "The Idiot", author: "Fyodor Dostoevsky", category: "maybe", rating: 0, description: "Prince Myshkin, an epileptic man of pure goodness, returns to corrupt Russian society and becomes entangled in a tragic love triangle. Dostoevsky explores whether true goodness can survive in a fallen world.", notes: "" },
          { id: Date.now() + 4, title: "No Longer Human", author: "Osamu Dazai", category: "maybe", rating: 0, description: "A semi-autobiographical novel following Yozo, a man who feels fundamentally disconnected from humanity and spirals through addiction, manipulation, and despair. Brutally honest about alienation and mental illness.", notes: "" },
          { id: Date.now() + 5, title: "A Thousand Splendid Suns", author: "Khaled Hosseini", category: "read", rating: 0, description: "Two Afghan women, Mariam and Laila, form an unlikely bond as they endure the violence of war, oppressive marriage, and Taliban rule. A story of female resilience, sacrifice, and friendship across decades of Afghan history.", notes: "" },
          { id: Date.now() + 6, title: "Gunahon Ka Devta", author: "Dharamvir Bharati", category: "maybe", rating: 0, description: "A Hindi novel about unfulfilled love, moral conflict, and societal pressures in post-independence India. The protagonist struggles between duty and desire in a deeply conservative society.", notes: "" },
          { id: Date.now() + 7, title: "Crime and Punishment", author: "Fyodor Dostoevsky", category: "maybe", rating: 0, description: "A poor student, Raskolnikov, murders a pawnbroker to test his theory that extraordinary men are above moral law. What follows is a psychological descent into guilt, paranoia, and eventual redemption.", notes: "" },
          { id: Date.now() + 8, title: "The Stranger", author: "Albert Camus", category: "read", rating: 0, description: "Meursault, an emotionally detached Frenchman in Algeria, kills a man seemingly without reason and refuses to perform the emotions society expects at his trial. A cornerstone of existentialist literature about absurdity and alienation.", notes: "" },
          { id: Date.now() + 9, title: "Beyond Good and Evil", author: "Friedrich Nietzsche", category: "maybe", rating: 0, description: "A collection of philosophical aphorisms challenging traditional morality, truth, and religion. Nietzsche dismantles Western values and proposes a revaluation of all values, introducing concepts like the will to power.", notes: "" },
          { id: Date.now() + 10, title: "The Metamorphosis", author: "Franz Kafka", category: "read", rating: 0, description: "Gregor Samsa wakes up one morning transformed into a giant insect. His family's reaction reveals the cruelty beneath social bonds. Kafka's surreal masterpiece about alienation, dehumanization, and the absurdity of existence.", notes: "" },
          { id: Date.now() + 11, title: "1984", author: "George Orwell", category: "maybe", rating: 0, description: "In a totalitarian future, Winston Smith works at the Ministry of Truth rewriting history for Big Brother. A dystopian warning about surveillance, propaganda, thought control, and the erasure of truth.", notes: "" },
          { id: Date.now() + 12, title: "Animal Farm", author: "George Orwell", category: "maybe", rating: 0, description: "Farm animals overthrow their human owner to create an equal society, but the pigs gradually become indistinguishable from the oppressors they replaced. A satirical allegory of the Russian Revolution and Stalinism.", notes: "" },
          { id: Date.now() + 13, title: "The Bell Jar", author: "Sylvia Plath", category: "maybe", rating: 0, description: "Esther Greenwood, a talented young woman in 1950s America, descends into depression and mental breakdown. Semi-autobiographical, Plath captures the suffocating expectations placed on women and the isolation of mental illness.", notes: "" },
          { id: Date.now() + 14, title: "Meditations", author: "Marcus Aurelius", category: "maybe", rating: 0, description: "The private reflections of a Roman emperor and Stoic philosopher. Written as personal reminders on discipline, mortality, duty, and acceptance. Not meant for publication, but now a foundational text on resilience.", notes: "" },
          { id: Date.now() + 15, title: "Madame Bovary", author: "Gustave Flaubert", category: "maybe", rating: 0, description: "Emma Bovary, trapped in a dull provincial marriage, pursues romantic affairs and luxury to escape her mundane reality. Her dreams lead to financial ruin and tragedy. A critique of romanticism and bourgeois life.", notes: "" },
          { id: Date.now() + 16, title: "The Master and Margarita", author: "Mikhail Bulgakov", category: "maybe", rating: 0, description: "The Devil visits Soviet Moscow with his entourage, exposing corruption and cowardice, while a parallel story retells Pontius Pilate's encounter with Christ. Written in secret under Stalin, published posthumously. Satirical, surreal, and subversive.", notes: "" },
          { id: Date.now() + 17, title: "Civilization and Its Discontents", author: "Sigmund Freud", category: "maybe", rating: 0, description: "Freud examines the tension between individual desires and the demands of civilization. He argues that societal order requires repression of instincts, leading to inevitable unhappiness and neurosis.", notes: "" },
          { id: Date.now() + 18, title: "Thus Spoke Zarathustra", author: "Friedrich Nietzsche", category: "maybe", rating: 0, description: "A philosophical novel in which Zarathustra descends from the mountains to teach humanity about the Übermensch, eternal recurrence, and the death of God. Written as prophecy and poetry, not systematic argument.", notes: "" },
          { id: Date.now() + 19, title: "Notes from Underground", author: "Fyodor Dostoevsky", category: "maybe", rating: 0, description: "An unnamed narrator, bitter and isolated, dissects his own psychology and rages against rationalism and utopian ideals. A proto-existentialist work exploring spite, free will, and the irrationality of human nature.", notes: "" },
          { id: Date.now() + 20, title: "The Brothers Karamazov", author: "Fyodor Dostoevsky", category: "maybe", rating: 0, description: "Three brothers—intellectual Ivan, passionate Dmitri, and spiritual Alyosha—grapple with faith, morality, and free will after their father's murder. The Grand Inquisitor chapter alone is a philosophical masterpiece. Dostoevsky's final and greatest novel.", notes: "" },
          { id: Date.now() + 21, title: "White Nights", author: "Fyodor Dostoevsky", category: "maybe", rating: 0, description: "A lonely dreamer in St. Petersburg meets a young woman over four nights and falls in love, only to realize she's waiting for someone else. A short, melancholic story about longing, illusion, and unreciprocated love.", notes: "" },
          { id: Date.now() + 22, title: "Man's Search for Meaning", author: "Viktor Frankl", category: "maybe", rating: 0, description: "A psychiatrist's account of surviving Nazi concentration camps and the development of logotherapy—the idea that finding meaning is central to human existence. Part memoir, part philosophical treatise on enduring suffering.", notes: "" }
        ];
      },

      loadBooks() {
        try {
          const saved = localStorage.getItem('myLibraryBooks_v2');
          if (saved) {
            this.books = JSON.parse(saved);
          } else {
            this.books = this.getDefaultBooks();
            this.saveToStorage();
          }
          this.renderBooks();
          this.updateStats();
        } catch (e) {
          alert('Error loading books: ' + e.message);
        }
      },

      saveToStorage() {
        try {
          localStorage.setItem('myLibraryBooks_v2', JSON.stringify(this.books));
        } catch (e) {
          alert('Error saving: ' + e.message);
        }
      },

      updateStats() {
        document.getElementById('stat-total').textContent = this.books.length;
        document.getElementById('stat-read').textContent = this.books.filter(b => b.category === 'read').length;
        document.getElementById('stat-toread').textContent = this.books.filter(b => b.category === 'to_read').length;
        document.getElementById('stat-maybe').textContent = this.books.filter(b => b.category === 'maybe').length;
      },

      filterCategory(category) {
        this.currentFilter = category;
        this.renderBooks();
        document.querySelectorAll('.stat-card').forEach(card => card.classList.remove('active'));
      },

      renderBooks() {
        const container = document.getElementById('booksContainer');
        const searchQuery = document.getElementById('searchInput').value.toLowerCase();
        
        let filtered = this.books.filter(book => {
          const matchesCategory = !this.currentFilter || book.category === this.currentFilter;
          const matchesSearch = !searchQuery || 
            book.title.toLowerCase().includes(searchQuery) ||
            (book.author && book.author.toLowerCase().includes(searchQuery));
          return matchesCategory && matchesSearch;
        });

        if (filtered.length === 0) {
          container.innerHTML = '<div class="empty-state"><div style="font-size: 3em; margin-bottom: 16px; opacity: 0.5;">📚</div><div style="font-size: 1.1em;">No books found</div></div>';
          return;
        }

        const categoryLabels = {
          'to_read': 'Not Read Yet',
          'reading': 'Currently Reading',
          'read': 'Already Read',
          'maybe': 'May Read'
        };

        container.innerHTML = filtered.map(book => `
          <div class="book-card">
            <div onclick="app.viewBook(${book.id})">
              <div class="book-title">${book.title}</div>
              ${book.author ? `<div class="book-author">${book.author}</div>` : ''}
              <div class="book-meta">
                <span class="badge">${categoryLabels[book.category]}</span>
                ${book.rating > 0 ? `<span class="badge" style="color: #f4c542;">★ ${book.rating}/5</span>` : ''}
              </div>
            </div>
            <div class="book-actions">
              <button class="book-action-btn" onclick="app.editBook(${book.id})">Edit</button>
              ${book.category !== 'read' ? `<button class="book-action-btn" onclick="app.markAsRead(${book.id})">Mark Read</button>` : ''}
              <button class="book-action-btn delete-btn" onclick="app.deleteBook(${book.id})">Delete</button>
            </div>
          </div>
        `).join('');
      },

      openAddModal() {
        this.editingId = null;
        this.currentRating = 0;
        document.getElementById('modalTitle').textContent = 'Add Book';
        document.getElementById('bookTitle').value = '';
        document.getElementById('bookAuthor').value = '';
        document.getElementById('bookCategory').value = 'to_read';
        document.getElementById('bookDescription').value = '';
        document.getElementById('bookNotes').value = '';
        this.updateRatingDisplay();
        document.getElementById('bookModal').classList.add('show');
      },

      closeModal() {
        document.getElementById('bookModal').classList.remove('show');
      },

      setRating(rating) {
        this.currentRating = rating;
        this.updateRatingDisplay();
      },

      updateRatingDisplay() {
        const stars = document.querySelectorAll('#ratingInput .star');
        stars.forEach((star, index) => {
          if (index < this.currentRating) {
            star.classList.add('active');
          } else {
            star.classList.remove('active');
          }
        });
      },

      saveBook() {
        const title = document.getElementById('bookTitle').value.trim();
        if (!title) {
          alert('Please enter a book title');
          return;
        }

        const book = {
          id: this.editingId || Date.now(),
          title: title,
          author: document.getElementById('bookAuthor').value.trim(),
          category: document.getElementById('bookCategory').value,
          description: document.getElementById('bookDescription').value.trim(),
          notes: document.getElementById('bookNotes').value.trim(),
          rating: this.currentRating
        };

        if (this.editingId) {
          this.books = this.books.map(b => b.id === this.editingId ? book : b);
        } else {
          this.books.push(book);
        }

        this.saveToStorage();
        this.renderBooks();
        this.updateStats();
        this.closeModal();
      },

      editBook(id) {
        const book = this.books.find(b => b.id === id);
        if (!book) return;

        this.editingId = id;
        this.currentRating = book.rating || 0;
        document.getElementById('modalTitle').textContent = 'Edit Book';
        document.getElementById('bookTitle').value = book.title;
        document.getElementById('bookAuthor').value = book.author || '';
        document.getElementById('bookCategory').value = book.category;
        document.getElementById('bookDescription').value = book.description || '';
        document.getElementById('bookNotes').value = book.notes || '';
        this.updateRatingDisplay();
        document.getElementById('bookModal').classList.add('show');
      },

      viewBook(id) {
        const book = this.books.find(b => b.id === id);
        if (!book) return;

        const categoryLabels = {
          'to_read': 'Not Read Yet',
          'reading': 'Currently Reading',
          'read': 'Already Read',
          'maybe': 'May Read'
        };

        document.getElementById('viewTitle').textContent = book.title;
        document.getElementById('viewContent').innerHTML = `
          ${book.author ? `<p style="color: #8a7c6b; margin-bottom: 16px;">by ${book.author}</p>` : ''}
          <div style="margin-bottom: 16px;">
            <span class="badge">${categoryLabels[book.category]}</span>
            ${book.rating > 0 ? `<span class="badge" style="color: #f4c542; margin-left: 8px;">★ ${book.rating}/5</span>` : ''}
          </div>
          ${book.description ? `<div style="margin-bottom: 20px;"><div style="font-size: 0.85em; color: #8a7c6b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em;">Description</div><div style="line-height: 1.7; color: #d4cfc4;">${book.description}</div></div>` : ''}
          ${book.notes ? `<div style="background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(200, 170, 120, 0.15); border-radius: 8px; padding: 20px;"><div style="font-size: 0.85em; color: #8a7c6b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.1em;">Personal Notes</div><div style="line-height: 1.7; color: #d4cfc4;">${book.notes}</div></div>` : ''}
        `;
        document.getElementById('viewModal').classList.add('show');
      },

      closeViewModal() {
        document.getElementById('viewModal').classList.remove('show');
      },

      deleteBook(id) {
        if (confirm('Are you sure you want to delete this book?')) {
          this.books = this.books.filter(b => b.id !== id);
          this.saveToStorage();
          this.renderBooks();
          this.updateStats();
        }
      },

      markAsRead(id) {
        this.books = this.books.map(b => b.id === id ? {...b, category: 'read'} : b);
        this.saveToStorage();
        this.renderBooks();
        this.updateStats();
      },

      exportData() {
        const dataStr = JSON.stringify(this.books, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'my-library-backup.json';
        a.click();
      },

      importData(event) {
        const file = event.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (e) => {
            try {
              const imported = JSON.parse(e.target.result);
              if (confirm(`Import ${imported.length} books? This will replace your current library.`)) {
                this.books = imported;
                this.saveToStorage();
                this.renderBooks();
                this.updateStats();
              }
            } catch (error) {
              alert('Invalid file format');
            }
          };
          reader.readAsText(file);
        }
      },

      resetToDefaults() {
        if (confirm('Reset library to default 22 books? This will DELETE your current library.')) {
          // Clear old storage
          localStorage.removeItem('myLibraryBooks');
          localStorage.removeItem('myLibraryBooks_v2');
          
          // Load fresh defaults
          this.books = this.getDefaultBooks();
          this.saveToStorage();
          this.renderBooks();
          this.updateStats();
          alert('Library reset complete! You now have 22 default books.');
        }
      }
    };

    // Initialize on load
    window.onload = function() {
      app.loadBooks();
    };
  </script>
</body>
</html>
